<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Project</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h2>New Energy Audit Project</h2>

<hr>

<h4>Customer Information</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label>Company Name *</label>

<input
type="text"
id="companyName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Plant Name</label>

<input
type="text"
id="plantName"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Contact Person *</label>

<input
type="text"
id="contactPerson"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Designation</label>

<input
type="text"
id="designation"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Mobile Number *</label>

<input
type="text"
id="mobile"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control">

</div>

<div class="col-md-12 mb-3">

<label>Address</label>

<textarea
id="address"
class="form-control"></textarea>

</div>

<div class="col-md-4">

<label>City</label>

<input
id="city"
class="form-control">

</div>

<div class="col-md-4">

<label>State</label>

<input
id="state"
class="form-control">

</div>

<div class="col-md-4">

<label>Pincode</label>

<input
id="pincode"
class="form-control">

</div>

<div class="col-md-6 mt-3">

<label>Audit Type</label>

<select
id="auditType"
class="form-select">

<option>Chiller Audit</option>

<option>Compressor Audit</option>

<option>Both</option>

</select>

</div>

<div class="col-md-6 mt-3">

<label>Audit Date</label>

<input
type="date"
id="auditDate"
class="form-control">

</div>

</div>

<hr>

<button
id="saveProjectBtn"
class="btn btn-success">

Save & Next

</button>

<a href="dashboard.html" class="btn btn-secondary">

Cancel

</a>

</div>
<script src="../assets/js/storage.js"></script>
<script src="../assets/js/project.js"></script>
</body>

</html>
